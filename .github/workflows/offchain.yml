name: CI/CD (Offchain)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  Publish:
    name: Lint + Test + Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: "@sundaeswap"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_NPM_TOKEN }}

      - name: Install dependencies
        run: |
          cd offchain
          bun install --frozen-lockfile

      - name: Lint
        run: |
          cd offchain
          bun lint

      - name: Test
        run: |
          cd offchain
          bun test

      - name: Build
        run: |
          cd offchain
          bun run build

      - name: Configure npm authentication
        env:
          PUBLISH_NPM_TOKEN: ${{ secrets.PUBLISH_NPM_TOKEN }}
        run: |
          if [ -z "$PUBLISH_NPM_TOKEN" ]; then
            echo "::error::PUBLISH_NPM_TOKEN is not set in repository secrets."
            exit 1
          fi
          npm config set //registry.npmjs.org/:_authToken "$PUBLISH_NPM_TOKEN"

      - id: check
        name: Check published version
        run: |
          cd offchain
          LOCAL=$(jq -r .version package.json)
          REMOTE=$(npm view @sundaeswap/treasury-funds version 2>/dev/null || true)
          echo "Local: $LOCAL"
          echo "Remote: ${REMOTE:-<unpublished>}"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check.outputs.changed == 'true'
        run: |
          cd offchain
          npm publish

      - name: Log Unchanged
        if: steps.check.outputs.changed == 'false'
        run: echo "Skipping publish because version is unchanged"
